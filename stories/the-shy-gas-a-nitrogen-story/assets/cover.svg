<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 320" width="240" height="320">
  <!-- A calm, bedtime night sky for the shy gas -->
  <defs>
    <linearGradient id="nightsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1630"/>
      <stop offset="55%" stop-color="#1c2c54"/>
      <stop offset="100%" stop-color="#2d4476"/>
    </linearGradient>
    <radialGradient id="atomglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9fd8ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#9fd8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="atomface" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#dff1ff"/>
      <stop offset="100%" stop-color="#6ba8d6"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="240" height="320" fill="url(#nightsky)"/>

  <!-- Stars -->
  <circle cx="28" cy="30" r="1.1" fill="white" opacity="0.7"/>
  <circle cx="70" cy="20" r="0.9" fill="white" opacity="0.6"/>
  <circle cx="120" cy="34" r="1.2" fill="white" opacity="0.85"/>
  <circle cx="180" cy="22" r="1" fill="white" opacity="0.6"/>
  <circle cx="212" cy="40" r="1.1" fill="white" opacity="0.7"/>
  <circle cx="48" cy="60" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="200" cy="70" r="0.9" fill="white" opacity="0.6"/>
  <circle cx="32" cy="120" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="210" cy="150" r="0.9" fill="white" opacity="0.5"/>
  <circle cx="60" cy="200" r="0.8" fill="white" opacity="0.45"/>
  <circle cx="195" cy="210" r="1" fill="white" opacity="0.5"/>

  <!-- Crescent moon -->
  <circle cx="196" cy="46" r="13" fill="#fdf3cf" opacity="0.92"/>
  <circle cx="201" cy="42" r="11" fill="#16213f" opacity="0.95"/>

  <!-- The N2 molecule: two atoms gripping in a triple bond -->
  <!-- Soft glows -->
  <circle cx="88" cy="150" r="46" fill="url(#atomglow)"/>
  <circle cx="152" cy="150" r="46" fill="url(#atomglow)"/>

  <!-- Triple bond (three handshakes) -->
  <g stroke="#bfe4ff" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <line x1="108" y1="136" x2="132" y2="136"/>
    <line x1="104" y1="150" x2="136" y2="150"/>
    <line x1="108" y1="164" x2="132" y2="164"/>
  </g>

  <!-- Atom 1 -->
  <circle cx="88" cy="150" r="30" fill="url(#atomface)" stroke="#bfe4ff" stroke-width="1.5"/>
  <text x="88" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#1c2c54">N</text>

  <!-- Atom 2 -->
  <circle cx="152" cy="150" r="30" fill="url(#atomface)" stroke="#bfe4ff" stroke-width="1.5"/>
  <text x="152" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#1c2c54">N</text>

  <!-- Title plate -->
  <rect x="0" y="258" width="240" height="62" fill="#0b1226" opacity="0.78"/>
  <text x="120" y="282" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-style="italic" fill="#eaf3ff">The Shy Gas</text>
  <text x="120" y="299" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#9fc4e6">A Nitrogen Story</text>
  <text x="120" y="313" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#6f93b8">a bedtime tale of N₂</text>
</svg>
